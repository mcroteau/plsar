<plsar:namespace var="plsar"/>

${todos.size()}
<!-- // basic -->

<plsar:if condition="${todo.person.name == 'Raul'}">
    is raul
</plsar:if>
<plsar:if condition="${name == 'Abdul'}">
    is abdul
</plsar:if>
<plsar:if condition="${condition}">
    meets condition
</plsar:if>
<plsar:if condition="${!opposite}">
    !meets opposite
</plsar:if>
<plsar:if condition="${todos.size() > 0}">
    size > 0
</plsar:if>


<!-- // opposites -->
<plsar:if condition="${todo.person.name != 'Foo'}">
    ! is foo
</plsar:if>
<plsar:if condition="${name != 'Jabar'}">
    ! is jabar
</plsar:if>


<!-- // hide em -->
<plsar:if condition="${todo.person.name != 'Raul'}">
    hide ! is raul
</plsar:if>
<plsar:if condition="${name != 'Abdul'}">
    hide ! is abdul
</plsar:if>
<plsar:if condition="${!condition}">
    hidden
</plsar:if>
<plsar:if condition="${todos.size() == 0}">
    size == 0 hidden
</plsar:if>
